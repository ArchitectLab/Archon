<!-- @dsCard group="Components" name="Controls" subtitle="Switch · Checkbox · Radio · Segmented — animated, on-brand" viewport="1040x680" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Architect Lab — Controls</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 56px; }
  .stage { max-width: 920px; margin: 0 auto; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 22px; }
  .panel { background: var(--al-panel); border: 1px solid var(--al-line); border-radius: 12px; padding: 26px; display: flex; flex-direction: column; gap: 18px; }
  .panel h3 { margin: 0; font-size: 13px; font-family: var(--al-font-mono); letter-spacing: .16em; text-transform: uppercase; color: var(--al-slate); font-weight: 500; }
  .col { display: flex; flex-direction: column; gap: 14px; align-items: flex-start; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
</style>
</head>
<body class="al-blueprint">
  <div class="stage">
    <span class="al-tag al-tag--spectrum">// components</span>
    <h1 style="margin:14px 0 6px;font-size:36px">Controls</h1>
    <p style="color:var(--al-slate);max-width:600px;margin:0">Switch, checkbox, radio and the segmented control. The spectrum signals the “on” state; the motion is quick and mechanical.</p>
    <div class="grid" id="root"></div>
  </div>

  <script type="text/babel">
    const { Switch, Checkbox, Radio, SegmentedControl } = window.ArchitectLabDesignSystem_61bf68;
    function Demo() {
      const [sw, setSw] = React.useState({ open: true, scan: false });
      const [ck, setCk] = React.useState({ oss: true, mentor: true, nda: false });
      const [track, setTrack] = React.useState('ai');
      const [mode, setMode] = React.useState('materialize');
      const [view, setView] = React.useState('grid');
      return (
        <>
          <div className="panel">
            <h3>Switch</h3>
            <div className="col">
              <Switch checked={sw.open} onChange={(v) => setSw({ ...sw, open: v })} label="Cohort applications open" />
              <Switch checked={sw.scan} onChange={(v) => setSw({ ...sw, scan: v })} label="Spectrum scan on reveal" />
              <Switch defaultChecked={false} disabled label="Locked (disabled)" />
            </div>
          </div>

          <div className="panel">
            <h3>Checkbox</h3>
            <div className="col">
              <Checkbox checked={ck.oss} onChange={(v) => setCk({ ...ck, oss: v })} label="Open-source the project" />
              <Checkbox checked={ck.mentor} onChange={(v) => setCk({ ...ck, mentor: v })} label="Request a mentor review" />
              <Checkbox checked={ck.nda} onChange={(v) => setCk({ ...ck, nda: v })} label="Sign the NDA" />
              <Checkbox defaultChecked disabled label="Required (disabled)" />
            </div>
          </div>

          <div className="panel">
            <h3>Radio — pick a track</h3>
            <div className="col">
              {[['ai', 'Artificial Intelligence'], ['cyber', 'Cybersecurity'], ['both', 'Both tracks']].map(([v, l]) => (
                <Radio key={v} value={v} checked={track === v} onChange={setTrack} label={l} />
              ))}
            </div>
          </div>

          <div className="panel">
            <h3>Segmented control</h3>
            <div className="col">
              <SegmentedControl
                options={[{ label: 'Materialize', value: 'materialize' }, { label: 'Scan', value: 'scan' }, { label: 'Draft', value: 'draft' }, { label: 'Calm', value: 'calm' }]}
                value={mode} onChange={setMode} />
              <SegmentedControl tone="spectrum" options={['Grid', 'List']} value={view} onChange={setView} />
            </div>
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
