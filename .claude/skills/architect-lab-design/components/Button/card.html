<!-- @dsCard group="Components" name="Button" subtitle="Actions — simple + animated fx (hover), plus IconButton" viewport="980x780" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Architect Lab — Button</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 56px; }
  .stage { max-width: 860px; margin: 0 auto; }
  .panel { background: var(--al-panel); border: 1px solid var(--al-line); border-radius: 12px; padding: 28px; margin-top: 22px; }
  .grp { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .grp + .grp { margin-top: 22px; padding-top: 22px; border-top: 1px solid var(--al-line); }
  .lab { font-family: var(--al-font-mono); font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--al-slate); width: 110px; flex: none; }
</style>
</head>
<body class="al-blueprint">
  <div class="stage">
    <span class="al-tag al-tag--spectrum">// components</span>
    <h1 style="margin:14px 0 6px;font-size:36px">Button</h1>
    <p style="color:var(--al-slate);max-width:580px;margin:0">The primary action carries the spectrum; everything else stays blueprint-quiet. <b style="color:var(--al-paper);font-weight:600">Hover the animated row</b> — sweep, glow, scanline, cartouche.</p>
    <div class="panel" id="root"></div>
  </div>

  <script type="text/babel">
    const { Button, IconButton } = window.ArchitectLabDesignSystem_61bf68;
    function Demo() {
      React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
      const I = (n) => <i data-lucide={n} style={{ width: 16, height: 16 }} />;
      return (
        <>
          <div className="grp"><span className="lab">Variants</span>
            <Button variant="spectrum">Deploy</Button>
            <Button variant="primary">Save changes</Button>
            <Button variant="secondary">Cancel</Button>
            <Button variant="ghost">Learn more</Button>
          </div>
          <div className="grp"><span className="lab">Sizes</span>
            <Button size="sm">Small</Button>
            <Button size="md">Medium</Button>
            <Button size="lg">Large</Button>
          </div>
          <div className="grp"><span className="lab">Animated · hover</span>
            <Button variant="spectrum" fx="sweep">Sweep</Button>
            <Button variant="primary" fx="glow">Glow</Button>
            <Button variant="secondary" fx="scanline">Scanline</Button>
            <Button variant="secondary" fx="draw">Cartouche</Button>
          </div>
          <div className="grp"><span className="lab">With icon</span>
            <Button variant="spectrum" iconRight={I('arrow-right')}>Build</Button>
            <Button variant="secondary" iconLeft={I('terminal')}>Run script</Button>
          </div>
          <div className="grp"><span className="lab">Icon button</span>
            <IconButton label="Search">{I('search')}</IconButton>
            <IconButton label="Settings">{I('settings')}</IconButton>
            <IconButton variant="ghost" label="More">{I('more-horizontal')}</IconButton>
            <IconButton size="lg" label="Add">{I('plus')}</IconButton>
          </div>
          <div className="grp"><span className="lab">Disabled</span>
            <Button variant="primary" disabled>Unavailable</Button>
            <Button variant="secondary" disabled>Unavailable</Button>
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
